name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image variables
        id: vars
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_TAG="${GITHUB_SHA}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_name }}:latest
            ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.image_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    env:
      VPS_HOST: 146.59.12.114
      VPS_USER: debian
      VPS_SSH_PORT: 22
      VPS_APP_DIR: /home/debian/fastapi-cicd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.GHCR_PAT }}" ]; then
            echo "Missing required secret: GHCR_PAT"
            exit 1
          fi

      - name: Upload docker-compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_SSH_PORT }}
          source: "docker-compose.yml"
          target: ${{ env.VPS_APP_DIR }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ env.VPS_SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ env.VPS_APP_DIR }}"
            cd "${{ env.VPS_APP_DIR }}"
            echo "GHCR_IMAGE=${{ needs.build-and-push.outputs.image_name }}" > .env
            echo "IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}" >> .env
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
